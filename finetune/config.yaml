bart-base:
  num_train_epochs: 15
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8    
  per_device_eval_batch_size: 4   
  save_strategy: 'epoch' 
  logging_steps: 10
  save_strategy: 'no'
  learning_rate: 5e-5
  warmup_steps: 100
  max_grad_norm: 1.0
  weight_decay: 0.02
  fp16: True
  bf16: False

bart-large:
  num_train_epochs: 15
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16    
  per_device_eval_batch_size: 1    
  logging_steps: 10
  save_strategy: 'epoch'
  learning_rate: 2e-5
  max_grad_norm: 1.0
  warmup_steps: 100
  weight_decay: 0.02
  fp16: True
  bf16: False

llama-2:
  num_train_epochs: 5
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  gradient_checkpointing: True
  optim: 'paged_adamw_32bit'
  logging_steps: 10
  save_strategy: 'no'
  learning_rate: 2e-4
  bf16: True
  fp16: False
  tf32: True
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  lr_scheduler_type: 'constant'